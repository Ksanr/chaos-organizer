name: Deploy Backend

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'  # Запускать только при изменениях в папке backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: Start server
        run: |
          cd backend
          npm start &  # Запускаем сервер в фоновом режиме